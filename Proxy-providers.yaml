# 支持多机场的clashverge自用yaml文件，无需全局拓展脚本
# 支持多地区、串流平台、社交平台、AI等多场景分流
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# DNS配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: false
  respect-rules: true
  use-system-hosts: false
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    # 本地主机/设备
    - "+.lan"
    - "+.local"
    # Windows网络出现小地球图标
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    # QQ快速登录检测失败
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    # 追加以下条目
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "pool.ntp.org"
    # 微信快速登录检测失败
    - "localhost.work.weixin.qq.com"
  default-nameserver: ["223.5.5.5", "1.2.4.8"]
  nameserver:
    - "https://208.67.222.222/dns-query" # OpenDNS
    - "https://77.88.8.8/dns-query" # YandexDNS
    - "https://1.1.1.1/dns-query" # CloudflareDNS
    - "https://8.8.4.4/dns-query" # GoogleDNS
  proxy-server-nameserver:
    - "https://223.5.5.5/dns-query" # 阿里DoH
    - "https://doh.pub/dns-query" # 腾讯DoH
  direct-nameserver:
    - "https://223.5.5.5/dns-query" # 阿里DoH
    - "https://doh.pub/dns-query" # 腾讯DoH
  nameserver-policy:
    "geosite:private,cn":
      - "https://223.5.5.5/dns-query"
      - "https://doh.pub/dns-query"

# 代理集配置 (机场订阅链接)
proxy-providers:
  Provider1:
    type: http
    url: "你的机场订阅链接1"
    interval: 3600
    path: ./sub/Provider1.yaml
    health-check:
      enable: true
      interval: 300
      url: https://www.gstatic.com/generate_204
  Provider2:
    type: http
    url: "你的机场订阅链接2"
    interval: 3600
    path: ./sub/Provider2.yaml
    health-check:
      enable: true
      interval: 300
      url: https://www.gstatic.com/generate_204

# 代理组配置
